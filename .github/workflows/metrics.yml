name: Metrics

on:
  schedule:
    - cron: "0 0 * * *" # daily
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: General stats
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: ilovekgl
          base: "header, activity, community, repositories, metadata"
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
          output_action: commit
          committer_message: "chore: update metrics"

      - name: Repositories (featured & pinned)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.repositories.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: ilovekgl
          base: ""
          plugin_repositories: yes
          plugin_repositories_pinned: 6
          output_action: commit
          committer_message: "chore: update metrics (repositories)"

      - name: Calendar (isometric)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.calendar.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: ilovekgl
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          output_action: commit
          committer_message: "chore: update metrics (calendar)"

      - name: Languages (most used)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: ilovekgl
          base: ""
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          output_action: commit
          committer_message: "chore: update metrics (languages)"
